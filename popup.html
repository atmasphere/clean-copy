<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background .15s;
    }
    .btn:hover { background: #0f3460; }
    .btn:active { background: #1a5276; }
    .btn.primary {
      background: #0f3460;
      border-color: #1a5276;
      font-weight: 600;
    }
    .btn.primary:hover { background: #1a5276; }
    .btn:last-child { margin-bottom: 0; }
    .btn .shortcut {
      float: right;
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      min-height: 18px;
    }
    .status.success { color: #4caf50; }
    .status.error { color: #ef5350; }
  </style>
</head>
<body>
  <h1>Clean Copy</h1>
  <button class="btn primary" id="read-clean">
    Read Clean
    <span class="shortcut">⌘⇧R</span>
  </button>
  <button class="btn" id="copy-md">
    Copy as Markdown
    <span class="shortcut">⌘⇧C</span>
  </button>
  <button class="btn" id="copy-text">Copy as Plain Text</button>
  <button class="btn" id="copy-html">Copy as Clean HTML</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
